name: magis-watch
on:
  schedule:
    - cron: "*/5 * * * *"   # 5 dakikada bir (GitHub bazen gecikmeli çalıştırır)
  workflow_dispatch:          # manuel tetikleme

permissions:
  contents: write             # seen.txt'i geri commitlemek için

concurrency:
  group: magis-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Yeni ilanları kontrol et
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ vars.TG_CHAT_ID }}
        run: bash watch.sh
      - name: Durumu güncelle
        run: |
          if ! git diff --quiet seen.txt; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add seen.txt
            git commit -m "durum güncelle"
            git push
          fi
